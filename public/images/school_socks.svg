<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="100%" height="100%">
  <defs>
    <filter id="flatShadow" x="-10%" y="-10%" width="120%" height="125%">
      <feDropShadow dx="0" dy="8" stdDeviation="6" flood-color="#0f172a" flood-opacity="0.12" />
    </filter>
    
    <linearGradient id="socksGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffffff" />
      <stop offset="80%" stop-color="#f8fafc" />
      <stop offset="100%" stop-color="#e2e8f0" />
    </linearGradient>

    <linearGradient id="socksShadow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#e2e8f0" />
      <stop offset="100%" stop-color="#cbd5e1" />
    </linearGradient>
  </defs>

  <rect width="100%" height="100%" fill="none" />

  <g filter="url(#flatShadow)">
    <!-- Sock 1 (Underneath, angled slightly left) -->
    <g transform="translate(130, 90) rotate(-10)">
      <!-- Ribbed cuff -->
      <rect x="0" y="0" width="45" height="18" fill="url(#socksGrad)" stroke="#cbd5e1" stroke-width="0.5" rx="1" />
      <rect x="0" y="4" width="45" height="3" fill="#1e3a8a" />
      <rect x="0" y="10" width="45" height="3" fill="#1e3a8a" />

      <!-- Leg of Sock -->
      <path d="M 0,18 L 45,18 L 45,160 Q 45,185 20,185 L 0,185 Z" fill="url(#socksGrad)" stroke="#cbd5e1" stroke-width="0.5" />
      
      <!-- Folded Foot of Sock -->
      <path d="M 0,160 Q 0,185 -30,210 Q -55,225 -80,210 Q -90,195 -80,180 Q -65,160 0,160 Z" fill="url(#socksGrad)" stroke="#cbd5e1" stroke-width="0.5" />
      
      <!-- Heel reinforcement shadow -->
      <path d="M 0,160 Q 0,185 -15,185 C -25,175 -15,160 0,160 Z" fill="url(#socksShadow)" opacity="0.8" />
      <!-- Toe reinforcement shadow -->
      <path d="M -80,210 Q -90,195 -80,180 Q -72,185 -75,202 Z" fill="url(#socksShadow)" opacity="0.8" />
    </g>

    <!-- Sock 2 (Overlaid, angled slightly right) -->
    <g transform="translate(210, 95) rotate(8)">
      <!-- Ribbed cuff -->
      <rect x="0" y="0" width="45" height="18" fill="url(#socksGrad)" stroke="#cbd5e1" stroke-width="0.5" rx="1" />
      <rect x="0" y="4" width="45" height="3" fill="#1e3a8a" />
      <rect x="0" y="10" width="45" height="3" fill="#1e3a8a" />

      <!-- Leg of Sock -->
      <path d="M 0,18 L 45,18 L 45,160 Q 45,185 20,185 L 0,185 Z" fill="url(#socksGrad)" stroke="#cbd5e1" stroke-width="0.5" />
      
      <!-- Folded Foot of Sock -->
      <path d="M 45,160 Q 45,185 75,210 Q 100,225 125,210 Q 135,195 125,180 Q 110,160 45,160 Z" fill="url(#socksGrad)" stroke="#cbd5e1" stroke-width="0.5" />
      
      <!-- Heel reinforcement shadow -->
      <path d="M 45,160 Q 45,185 60,185 C 70,175 60,160 45,160 Z" fill="url(#socksShadow)" opacity="0.8" />
      <!-- Toe reinforcement shadow -->
      <path d="M 125,210 Q 135,195 125,180 Q 117,185 120,202 Z" fill="url(#socksShadow)" opacity="0.8" />
    </g>
  </g>
</svg>
