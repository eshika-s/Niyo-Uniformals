<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="100%" height="100%">
  <defs>
    <filter id="flatShadow" x="-10%" y="-10%" width="120%" height="125%">
      <feDropShadow dx="0" dy="8" stdDeviation="6" flood-color="#0f172a" flood-opacity="0.12" />
    </filter>
    
    <linearGradient id="shirtBase" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f0f9ff" />
      <stop offset="60%" stop-color="#e0f2fe" />
      <stop offset="100%" stop-color="#bae6fd" />
    </linearGradient>

    <linearGradient id="shirtShadow" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#bae6fd" />
      <stop offset="100%" stop-color="#7dd3fc" />
    </linearGradient>

    <linearGradient id="collarGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffffff" />
      <stop offset="100%" stop-color="#e0f2fe" />
    </linearGradient>
  </defs>

  <rect width="100%" height="100%" fill="none" />

  <g filter="url(#flatShadow)">
    <!-- 1. Folded Sleeves -->
    <!-- Left Sleeve Folded -->
    <path d="M 130,140 L 90,180 L 110,210 L 130,190 Z" fill="url(#shirtBase)" stroke="#bae6fd" stroke-width="0.5" />
    <path d="M 110,210 L 130,190 L 135,195 L 115,215 Z" fill="#e0f2fe" stroke="#93c5fd" stroke-width="0.5" /> <!-- Sleeve Cuff -->

    <!-- Right Sleeve Folded -->
    <path d="M 270,140 L 310,180 L 290,210 L 270,190 Z" fill="url(#shirtBase)" stroke="#bae6fd" stroke-width="0.5" />
    <path d="M 290,210 L 270,190 L 265,195 L 285,215 Z" fill="#e0f2fe" stroke="#93c5fd" stroke-width="0.5" />

    <!-- 2. Main Folded Shirt Body -->
    <path d="M 130,130 L 270,130 L 265,340 C 265,345 260,350 255,350 L 145,350 C 140,350 135,345 135,340 Z" fill="url(#shirtBase)" stroke="#93c5fd" stroke-width="0.5" />
    
    <!-- Shadow under shoulder -->
    <path d="M 130,130 L 270,130 L 270,140 L 130,140 Z" fill="#0284c7" opacity="0.08" />

    <!-- 3. Button Placket (Center strip) -->
    <rect x="193" y="140" width="14" height="210" fill="url(#collarGrad)" stroke="#bae6fd" stroke-width="0.5" />

    <!-- 4. Pointed Collar -->
    <!-- Inner Collar Stand -->
    <ellipse cx="200" cy="115" rx="35" ry="12" fill="url(#shirtShadow)" stroke="#7dd3fc" stroke-width="0.5" />
    <ellipse cx="200" cy="112" rx="33" ry="10" fill="#f0f9ff" />

    <!-- Left Collar Point -->
    <path d="M 165,110 L 200,148 L 200,123 Z" fill="url(#collarGrad)" stroke="#93c5fd" stroke-width="0.5" />
    <!-- Right Collar Point -->
    <path d="M 235,110 L 200,148 L 200,123 Z" fill="url(#collarGrad)" stroke="#93c5fd" stroke-width="0.5" />

    <!-- 5. Front Pocket -->
    <path d="M 215,170 L 250,167 L 250,205 Q 232,212 215,205 Z" fill="url(#shirtBase)" stroke="#93c5fd" stroke-width="0.5" stroke-dasharray="1.5,1.5" />
    <!-- Pocket flap seam -->
    <line x1="215" y1="175" x2="250" y2="172" stroke="#93c5fd" stroke-width="0.5" stroke-dasharray="1.5,1.5" />

    <!-- 6. Placket Buttons -->
    <circle cx="200" cy="155" r="3" fill="#ffffff" stroke="#93c5fd" stroke-width="0.5" />
    <circle cx="200" cy="195" r="3" fill="#ffffff" stroke="#93c5fd" stroke-width="0.5" />
    <circle cx="200" cy="235" r="3" fill="#ffffff" stroke="#93c5fd" stroke-width="0.5" />
    <circle cx="200" cy="275" r="3" fill="#ffffff" stroke="#93c5fd" stroke-width="0.5" />
    <circle cx="200" cy="315" r="3" fill="#ffffff" stroke="#93c5fd" stroke-width="0.5" />
  </g>
</svg>
