<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="100%" height="100%">
  <defs>
    <filter id="flatShadow" x="-10%" y="-10%" width="120%" height="125%">
      <feDropShadow dx="0" dy="8" stdDeviation="6" flood-color="#0f172a" flood-opacity="0.12" />
    </filter>
    
    <linearGradient id="tieRed" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#991b1b" />
      <stop offset="50%" stop-color="#7f1d1d" />
      <stop offset="100%" stop-color="#450a0a" />
    </linearGradient>

    <linearGradient id="tieGold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fbbf24" />
      <stop offset="100%" stop-color="#d97706" />
    </linearGradient>

    <linearGradient id="sheen" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0" />
      <stop offset="30%" stop-color="#ffffff" stop-opacity="0.1" />
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0" />
    </linearGradient>
  </defs>

  <rect width="100%" height="100%" fill="none" />

  <g filter="url(#flatShadow)">
    <!-- Tie Knot -->
    <path d="M 185,90 L 215,90 L 208,125 L 192,125 Z" fill="url(#tieRed)" stroke="#7f1d1d" stroke-width="0.5" />
    <path d="M 187,95 L 213,95 L 204,125 L 194,125 Z" fill="url(#tieGold)" opacity="0.8" />
    <path d="M 185,90 L 215,90 L 208,125 L 192,125 Z" fill="url(#sheen)" />

    <!-- Tie Collar Loop (folded backward) -->
    <path d="M 185,90 Q 200,75 215,90 Q 200,85 185,90 Z" fill="#450a0a" />

    <!-- Main Tie Body -->
    <g>
      <!-- Base Shape -->
      <path d="M 192,125 L 208,125 L 225,325 L 200,350 L 175,325 Z" fill="url(#tieRed)" stroke="#7f1d1d" stroke-width="0.5" />
      
      <!-- Gold Stripes (diagonal) -->
      <path d="M 191,140 L 208,155 L 208,165 L 189,148 Z" fill="url(#tieGold)" />
      <path d="M 186,180 L 213,205 L 214,215 L 184,188 Z" fill="url(#tieGold)" />
      <path d="M 181,220 L 218,255 L 219,265 L 179,228 Z" fill="url(#tieGold)" />
      <path d="M 177,260 L 222,302 L 223,312 L 175,268 Z" fill="url(#tieGold)" />
      <path d="M 175,300 L 220,342 L 210,347 L 175,315 Z" fill="url(#tieGold)" />

      <!-- Shadow overlay at the bottom for folding look -->
      <path d="M 192,125 L 208,125 L 225,325 L 200,350 L 175,325 Z" fill="url(#sheen)" />
      <!-- Top shadow under knot -->
      <path d="M 192,125 L 208,125 L 210,135 L 190,135 Z" fill="#000000" opacity="0.3" />
    </g>
  </g>
</svg>
