<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="100%" height="100%">
  <defs>
    <filter id="flatShadow" x="-10%" y="-10%" width="120%" height="125%">
      <feDropShadow dx="0" dy="8" stdDeviation="6" flood-color="#0f172a" flood-opacity="0.15" />
    </filter>
    
    <linearGradient id="skirtNavy" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1e3a8a" />
      <stop offset="70%" stop-color="#1e3a8a" />
      <stop offset="100%" stop-color="#172554" />
    </linearGradient>

    <linearGradient id="skirtHighlight" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#3b82f6" />
      <stop offset="100%" stop-color="#1e3a8a" />
    </linearGradient>
  </defs>

  <rect width="100%" height="100%" fill="none" />

  <g filter="url(#flatShadow)">
    <!-- 1. Waistband -->
    <path d="M 140,110 L 260,110 L 263,130 L 137,130 Z" fill="url(#skirtNavy)" stroke="#1e293b" stroke-width="0.5" />
    <!-- Waistband stitching details -->
    <line x1="140" y1="115" x2="260" y2="115" stroke="#3b82f6" stroke-width="0.5" stroke-dasharray="1.5,1.5" opacity="0.6" />
    <line x1="138" y1="125" x2="262" y2="125" stroke="#3b82f6" stroke-width="0.5" stroke-dasharray="1.5,1.5" opacity="0.6" />

    <!-- 2. Pleated Skirt Body (Repeated Knife Pleats) -->
    <!-- Base Skirt Backdrop -->
    <path d="M 137,130 L 263,130 L 305,330 L 95,330 Z" fill="url(#skirtNavy)" />

    <!-- Pleat Segments (overlapping shadows and highlights) -->
    <!-- Pleat 1 (Far Left) -->
    <path d="M 137,130 L 150,130 L 115,330 L 95,330 Z" fill="#172554" />
    <path d="M 150,130 L 165,130 L 140,330 L 115,330 Z" fill="url(#skirtHighlight)" />

    <!-- Pleat 2 (Left Mid) -->
    <path d="M 165,130 L 178,130 L 165,330 L 140,330 Z" fill="#0f172a" opacity="0.4" />
    <path d="M 178,130 L 193,130 L 190,330 L 165,330 Z" fill="url(#skirtHighlight)" />

    <!-- Pleat 3 (Center) -->
    <path d="M 193,130 L 206,130 L 210,330 L 190,330 Z" fill="#0f172a" opacity="0.4" />
    <path d="M 206,130 L 221,130 L 235,330 L 210,330 Z" fill="url(#skirtHighlight)" />

    <!-- Pleat 4 (Right Mid) -->
    <path d="M 221,130 L 234,130 L 255,330 L 235,330 Z" fill="#0f172a" opacity="0.4" />
    <path d="M 234,130 L 249,130 L 280,330 L 255,330 Z" fill="url(#skirtHighlight)" />

    <!-- Pleat 5 (Far Right) -->
    <path d="M 249,130 L 263,130 L 305,330 L 280,330 Z" fill="#172554" />
    
    <!-- Hanger loop details at waist (flat lay decoration) -->
    <path d="M 148,110 Q 148,103 152,103 Q 156,103 156,110" fill="none" stroke="#64748b" stroke-width="1" />
    <path d="M 244,110 Q 244,103 248,103 Q 252,103 252,110" fill="none" stroke="#64748b" stroke-width="1" />
  </g>
</svg>
