<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="100%" height="100%">
  <defs>
    <filter id="flatShadow" x="-10%" y="-10%" width="120%" height="125%">
      <feDropShadow dx="0" dy="8" stdDeviation="6" flood-color="#0f172a" flood-opacity="0.15" />
    </filter>
    
    <linearGradient id="sweaterMaroon" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#991b1b" />
      <stop offset="60%" stop-color="#7f1d1d" />
      <stop offset="100%" stop-color="#5c0606" />
    </linearGradient>

    <linearGradient id="ribGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#7f1d1d" />
      <stop offset="50%" stop-color="#b91c1c" />
      <stop offset="100%" stop-color="#5c0606" />
    </linearGradient>

    <linearGradient id="shirtGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffffff" />
      <stop offset="100%" stop-color="#f1f5f9" />
    </linearGradient>
  </defs>

  <rect width="100%" height="100%" fill="none" />

  <g filter="url(#flatShadow)">
    <!-- 1. White Shirt Collar Inside V-Neck -->
    <path d="M 175,95 L 200,125 L 200,105 Z" fill="url(#shirtGrad)" stroke="#cbd5e1" stroke-width="1" />
    <path d="M 225,95 L 200,125 L 200,105 Z" fill="url(#shirtGrad)" stroke="#cbd5e1" stroke-width="1" />
    
    <!-- Dark inside collar shadow -->
    <path d="M 175,95 Q 200,100 225,95 Q 200,90 175,95 Z" fill="#475569" opacity="0.3" />

    <!-- 2. Sweater Pullover Body -->
    <path d="M 150,110 C 130,115 125,140 125,200 L 125,320 L 275,320 L 275,200 C 275,140 270,115 250,110 Z" fill="url(#sweaterMaroon)" />

    <!-- Sleeves Folded Back -->
    <!-- Left Sleeve -->
    <path d="M 130,115 C 100,140 90,210 90,280 L 110,280 L 125,180 Z" fill="#7f1d1d" />
    <rect x="90" y="280" width="20" height="8" fill="#5c0606" rx="1" /> <!-- Cuff -->

    <!-- Right Sleeve -->
    <path d="M 270,115 C 300,140 310,210 310,280 L 290,280 L 275,180 Z" fill="#5c0606" />
    <rect x="290" y="280" width="20" height="8" fill="#450505" rx="1" />

    <!-- 3. V-Neck Ribbed Border with Gold Accent Stripes -->
    <g>
      <!-- Base collar cut -->
      <path d="M 150,110 L 200,165 L 250,110 L 235,110 L 200,148 L 165,110 Z" fill="#7f1d1d" stroke="#5c0606" stroke-width="0.5" />
      
      <!-- Gold Stripe on V-neck border -->
      <path d="M 153,110 L 200,160 L 247,110 L 243,110 L 200,154 L 157,110 Z" fill="#eab308" />
    </g>

    <!-- 4. Waist Ribbed Band (Hem) -->
    <rect x="125" y="320" width="150" height="15" fill="url(#ribGrad)" stroke="#5c0606" stroke-width="0.5" rx="1" />
    <!-- Fine vertical lines to show ribbing texture -->
    <g stroke="#5c0606" stroke-width="0.75" opacity="0.6">
      <line x1="135" y1="320" x2="135" y2="335" />
      <line x1="145" y1="320" x2="145" y2="335" />
      <line x1="155" y1="320" x2="155" y2="335" />
      <line x1="165" y1="320" x2="165" y2="335" />
      <line x1="175" y1="320" x2="175" y2="335" />
      <line x1="185" y1="320" x2="185" y2="335" />
      <line x1="195" y1="320" x2="195" y2="335" />
      <line x1="205" y1="320" x2="205" y2="335" />
      <line x1="215" y1="320" x2="215" y2="335" />
      <line x1="225" y1="320" x2="225" y2="335" />
      <line x1="235" y1="320" x2="235" y2="335" />
      <line x1="245" y1="320" x2="245" y2="335" />
      <line x1="255" y1="320" x2="255" y2="335" />
      <line x1="265" y1="320" x2="265" y2="335" />
    </g>

    <!-- 5. Embroidered Crest on Left Chest -->
    <g transform="translate(145, 180)">
      <path d="M 0,0 C 0,0 4,-5 8,-2 C 12,-5 16,0 16,0 C 16,8 8,14 8,14 C 8,14 0,8 0,0 Z" fill="#eab308" />
      <circle cx="8" cy="5" r="2.5" fill="#7f1d1d" />
    </g>
  </g>
</svg>
