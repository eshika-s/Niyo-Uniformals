<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="100%" height="100%">
  <defs>
    <filter id="flatShadow" x="-10%" y="-10%" width="120%" height="125%">
      <feDropShadow dx="0" dy="8" stdDeviation="6" flood-color="#0f172a" flood-opacity="0.15" />
    </filter>
    
    <linearGradient id="pinaforeGrey" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#4b5563" />
      <stop offset="70%" stop-color="#374151" />
      <stop offset="100%" stop-color="#1f2937" />
    </linearGradient>

    <linearGradient id="pinaforeGreyHighlight" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#6b7280" />
      <stop offset="100%" stop-color="#4b5563" />
    </linearGradient>
    
    <linearGradient id="shirtGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffffff" />
      <stop offset="100%" stop-color="#f1f5f9" />
    </linearGradient>

    <linearGradient id="buttonGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#cbd5e1" />
      <stop offset="100%" stop-color="#64748b" />
    </linearGradient>
  </defs>

  <rect width="100%" height="100%" fill="none" />

  <g filter="url(#flatShadow)">
    <!-- 1. White Shirt Collar & Neckline under pinafore -->
    <path d="M 170,95 L 200,135 L 200,102 Z" fill="url(#shirtGrad)" stroke="#cbd5e1" stroke-width="1" />
    <path d="M 230,95 L 200,135 L 200,102 Z" fill="url(#shirtGrad)" stroke="#cbd5e1" stroke-width="1" />
    <path d="M 160,110 Q 200,100 240,110" fill="none" stroke="#e2e8f0" stroke-width="3" />

    <!-- 2. Main Pinafore Bodice (Upper Bib & Straps) -->
    <!-- Shoulder Straps -->
    <path d="M 145,115 L 175,115 L 175,180 L 145,180 Z" fill="url(#pinaforeGrey)" />
    <path d="M 225,115 L 255,115 L 255,180 L 225,180 Z" fill="url(#pinaforeGrey)" />
    
    <!-- Chest Bib -->
    <path d="M 155,170 L 245,170 L 240,230 L 160,230 Z" fill="url(#pinaforeGreyHighlight)" />
    <path d="M 160,170 Q 200,180 240,170" stroke="#1f2937" stroke-width="1" fill="none" />

    <!-- 3. Waist Band -->
    <path d="M 155,225 L 245,225 L 247,245 L 153,245 Z" fill="url(#pinaforeGrey)" stroke="#1f2937" stroke-width="0.5" />

    <!-- 4. Pleated Skirt (Classic Box Pleats) -->
    <g>
      <!-- Skirt Base Structure -->
      <path d="M 153,245 L 247,245 L 285,360 L 115,360 Z" fill="url(#pinaforeGrey)" />

      <!-- Pleats & Shadows (Alternating paths to simulate depth) -->
      <!-- Pleat 1 (Left) -->
      <path d="M 153,245 L 170,245 L 140,360 L 115,360 Z" fill="#374151" />
      <path d="M 170,245 L 187,245 L 170,360 L 140,360 Z" fill="url(#pinaforeGreyHighlight)" />

      <!-- Pleat 2 (Left Mid) -->
      <path d="M 187,245 L 200,245 L 195,360 L 170,360 Z" fill="#1f2937" opacity="0.35" />
      <path d="M 200,245 L 213,245 L 215,360 L 195,360 Z" fill="url(#pinaforeGreyHighlight)" />

      <!-- Pleat 3 (Right Mid) -->
      <path d="M 213,245 L 230,245 L 245,360 L 215,360 Z" fill="#1f2937" opacity="0.35" />
      <path d="M 230,245 L 247,245 L 285,360 L 245,360 Z" fill="url(#pinaforeGreyHighlight)" />
      
      <!-- Highlight lines (stitching detail) on waist -->
      <line x1="153" y1="235" x2="247" y2="235" stroke="#9ca3af" stroke-width="0.5" stroke-dasharray="2,2" />
    </g>

    <!-- 5. Button Details -->
    <!-- Strap Left Button -->
    <circle cx="160" cy="180" r="4.5" fill="url(#buttonGrad)" stroke="#1f2937" stroke-width="0.5" />
    <!-- Strap Right Button -->
    <circle cx="240" cy="180" r="4.5" fill="url(#buttonGrad)" stroke="#1f2937" stroke-width="0.5" />
  </g>
</svg>
