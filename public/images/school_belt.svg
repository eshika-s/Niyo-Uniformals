<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="100%" height="100%">
  <defs>
    <filter id="flatShadow" x="-10%" y="-10%" width="120%" height="125%">
      <feDropShadow dx="0" dy="8" stdDeviation="6" flood-color="#0f172a" flood-opacity="0.15" />
    </filter>
    
    <linearGradient id="leatherBrown" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#78350f" />
      <stop offset="60%" stop-color="#451a03" />
      <stop offset="100%" stop-color="#2d0f02" />
    </linearGradient>

    <linearGradient id="buckleGold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fef08a" />
      <stop offset="30%" stop-color="#f59e0b" />
      <stop offset="70%" stop-color="#d97706" />
      <stop offset="100%" stop-color="#78350f" />
    </linearGradient>

    <linearGradient id="metalSilver" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f8fafc" />
      <stop offset="50%" stop-color="#cbd5e1" />
      <stop offset="100%" stop-color="#64748b" />
    </linearGradient>
  </defs>

  <rect width="100%" height="100%" fill="none" />

  <g filter="url(#flatShadow)">
    <!-- 1. Coiled Leather Belt Body -->
    <!-- Inner Coil Layer (underneath) -->
    <path d="M 230,170 C 310,170 330,250 270,300 C 210,350 130,310 130,230 C 130,160 200,130 250,130 L 250,152 C 210,152 152,180 152,230 C 152,290 210,320 260,285 C 310,250 290,192 230,192 Z" fill="#2d0f02" opacity="0.6" />

    <!-- Main Outer Belt Strip (Laid out horizontally/curved) -->
    <path d="M 90,205 C 130,205 180,210 250,210 C 270,210 280,225 280,235 C 280,245 270,260 250,260 L 110,260" fill="none" stroke="url(#leatherBrown)" stroke-width="26" stroke-linecap="round" />

    <!-- Stitching lines along the belt edge -->
    <path d="M 100,196 C 135,196 182,201 250,201 C 272,201 289,219 289,235 C 289,251 272,269 250,269 L 120,269" fill="none" stroke="#b45309" stroke-width="0.75" stroke-dasharray="2,2" opacity="0.6" />

    <!-- Belt Holes -->
    <circle cx="250" cy="235" r="2.5" fill="#1e293b" />
    <circle cx="220" cy="235" r="2.5" fill="#1e293b" />
    <circle cx="190" cy="235" r="2.5" fill="#1e293b" />
    <circle cx="160" cy="235" r="2.5" fill="#1e293b" />

    <!-- 2. Leather Loop (Keeper) -->
    <rect x="115" y="220" width="10" height="30" fill="#2d0f02" rx="1" stroke="#451a03" stroke-width="0.5" />

    <!-- 3. Gold Buckle Assembly -->
    <g transform="translate(70, 215)">
      <!-- Buckle Base Ring (Rounded rectangle) -->
      <rect x="0" y="0" width="45" height="40" rx="8" fill="url(#buckleGold)" stroke="#b45309" stroke-width="0.5" />
      <rect x="7" y="7" width="31" height="26" rx="4" fill="#1e293b" /> <!-- Cutout -->
      
      <!-- Leather Belt tip showing inside buckle -->
      <path d="M 20,7 L 40,7 L 40,33 L 20,33 Z" fill="url(#leatherBrown)" />

      <!-- Buckle Prong (Pin) -->
      <path d="M 5,20 L 28,20" stroke="url(#metalSilver)" stroke-width="3" stroke-linecap="round" />
      
      <!-- Logo Crest in the center of the buckle plate -->
      <circle cx="34" cy="20" r="4" fill="url(#buckleGold)" />
      <polygon points="34,17 37,22 31,22" fill="#78350f" />
    </g>
  </g>
</svg>
